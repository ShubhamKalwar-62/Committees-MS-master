<section class="card shadow-sm">
	<div class="card-body">
		<h3 class="mb-3">Create Event</h3>
		<form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">Event Name</label>
					<input class="form-control" formControlName="eventName" />
				</div>
				<div class="col-md-6">
					<label class="form-label">Date</label>
					<input type="datetime-local" class="form-control" formControlName="eventDate" />
				</div>
				<div class="col-md-6">
					<label class="form-label">Location</label>
					<input class="form-control" formControlName="location" />
				</div>
				<div class="col-md-6">
					<label class="form-label">Max Participants</label>
					<input type="number" class="form-control" formControlName="maxParticipants" />
				</div>
				<div class="col-12">
					<label class="form-label">Description</label>
					<textarea class="form-control" formControlName="description"></textarea>
				</div>
			</div>
			<div class="mt-3">
				<app-reusable-button [type]="'submit'" [disabled]="submitting" [label]="submitting ? 'Saving...' : 'Save Event'"></app-reusable-button>
			</div>
		</form>
	</div>
</section>
