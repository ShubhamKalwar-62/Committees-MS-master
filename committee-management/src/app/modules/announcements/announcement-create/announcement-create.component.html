<section class="card shadow-sm">
	<div class="card-body">
		<h3 class="mb-3">Create Announcement</h3>
		<form [formGroup]="announcementForm" (ngSubmit)="onSubmit()">
			<div class="mb-3">
				<label class="form-label">Message</label>
				<textarea class="form-control" rows="4" formControlName="message"></textarea>
			</div>
			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">Committee ID</label>
					<input class="form-control" type="number" formControlName="committeeId" />
				</div>
				<div class="col-md-6">
					<label class="form-label">User ID</label>
					<input class="form-control" type="number" formControlName="userId" />
				</div>
			</div>
			<div class="mt-3">
				<app-reusable-button [type]="'submit'" [disabled]="saving" [label]="saving ? 'Saving...' : 'Publish Announcement'"></app-reusable-button>
			</div>
		</form>
	</div>
</section>
