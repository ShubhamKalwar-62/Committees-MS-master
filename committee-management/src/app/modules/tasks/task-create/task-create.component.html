<section class="card shadow-sm">
	<div class="card-body">
		<h3 class="mb-3">Create Task</h3>
		<form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">Title</label>
					<input class="form-control" formControlName="title" />
				</div>
				<div class="col-md-6">
					<label class="form-label">Priority</label>
					<select class="form-select" formControlName="priority">
						<option value="LOW">LOW</option>
						<option value="MEDIUM">MEDIUM</option>
						<option value="HIGH">HIGH</option>
					</select>
				</div>
				<div class="col-md-6">
					<label class="form-label">Start Date</label>
					<input type="datetime-local" class="form-control" formControlName="startDate" />
				</div>
				<div class="col-md-6">
					<label class="form-label">End Date</label>
					<input type="datetime-local" class="form-control" formControlName="endDate" />
				</div>
				<div class="col-12">
					<label class="form-label">Description</label>
					<textarea class="form-control" formControlName="description"></textarea>
				</div>
				<div class="col-md-4">
					<label class="form-label">Committee</label>
					<select class="form-select" formControlName="committeeId">
						<option *ngFor="let committee of committees" [ngValue]="committee.id">
							#{{ committee.id }} - {{ committee.committeeName }}
						</option>
					</select>
				</div>
				<div class="col-md-4">
					<label class="form-label">Created By</label>
					<select class="form-select" formControlName="createdById">
						<option *ngFor="let user of users" [ngValue]="user.id">
							#{{ user.id }} - {{ user.name }}
						</option>
					</select>
				</div>
				<div class="col-md-4">
					<label class="form-label">Assign To (optional)</label>
					<select class="form-select" formControlName="assignedToId">
						<option [ngValue]="null">Unassigned</option>
						<option *ngFor="let user of users" [ngValue]="user.id">
							#{{ user.id }} - {{ user.name }}
						</option>
					</select>
				</div>
			</div>
			<p *ngIf="errorMessage" class="text-danger mt-3 mb-0">{{ errorMessage }}</p>
			<div class="mt-3">
				<app-reusable-button [type]="'submit'" [disabled]="submitting" [label]="submitting ? 'Saving...' : 'Save Task'"></app-reusable-button>
			</div>
		</form>
	</div>
</section>
