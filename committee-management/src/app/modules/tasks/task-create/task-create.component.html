<section class="space-y-4">
	<article class="workspace-panel">
		<div class="workspace-panel-header">
			<div>
				<h3 class="workspace-panel-title">Create Task</h3>
				<p class="workspace-panel-subtitle">Plan assignments with clear ownership, priority, and schedule.</p>
			</div>
			<a routerLink="/tasks" class="workspace-btn-secondary">Back To Tasks</a>
		</div>

		<form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
			<div class="workspace-form-grid two-col">
				<div>
					<label class="workspace-label">Title</label>
					<input class="workspace-input" formControlName="title" />
					<p *ngIf="taskForm.controls.title.touched && taskForm.controls.title.invalid" class="workspace-helper-text text-rose-600">
						Task title is required.
					</p>
				</div>

				<div>
					<label class="workspace-label">Priority</label>
					<select class="workspace-select" formControlName="priority">
						<option value="LOW">LOW</option>
						<option value="MEDIUM">MEDIUM</option>
						<option value="HIGH">HIGH</option>
					</select>
				</div>

				<div>
					<label class="workspace-label">Start Date</label>
					<input type="datetime-local" class="workspace-input" formControlName="startDate" />
				</div>

				<div>
					<label class="workspace-label">End Date</label>
					<input type="datetime-local" class="workspace-input" formControlName="endDate" />
				</div>

				<div class="md:col-span-2">
					<label class="workspace-label">Description</label>
					<textarea class="workspace-textarea" formControlName="description"></textarea>
				</div>
			</div>

			<!-- Group assignment fields in a compact 3-column row for consistency with other forms. -->
			<div class="workspace-form-grid three-col mt-3">
				<div>
					<label class="workspace-label">Committee</label>
					<select class="workspace-select" formControlName="committeeId">
						<option *ngFor="let committee of committees" [ngValue]="committee.id">
							#{{ committee.id }} - {{ committee.committeeName }}
						</option>
					</select>
				</div>

				<div>
					<label class="workspace-label">Created By</label>
					<select class="workspace-select" formControlName="createdById">
						<option *ngFor="let user of users" [ngValue]="user.id">
							#{{ user.id }} - {{ user.name }}
						</option>
					</select>
				</div>

				<div>
					<label class="workspace-label">Assign To</label>
					<select class="workspace-select" formControlName="assignedToId">
						<option [ngValue]="null">Unassigned</option>
						<option *ngFor="let user of users" [ngValue]="user.id">
							#{{ user.id }} - {{ user.name }}
						</option>
					</select>
				</div>
			</div>

			<p *ngIf="errorMessage" class="workspace-error">{{ errorMessage }}</p>

			<div class="workspace-action-row">
				<button
					type="submit"
					[disabled]="submitting"
					class="workspace-btn-primary disabled:cursor-not-allowed disabled:opacity-65"
				>
					{{ submitting ? 'Saving...' : 'Save Task' }}
				</button>
			</div>
		</form>
	</article>
</section>
