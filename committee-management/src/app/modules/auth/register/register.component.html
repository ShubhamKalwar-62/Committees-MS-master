<section class="row justify-content-center">
	<div class="col-md-7 col-lg-6">
		<div class="card shadow-sm">
			<div class="card-body p-4">
				<h3 class="mb-3">Register</h3>

				<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>
					<div class="mb-3">
						<label class="form-label">Full Name</label>
						<input class="form-control" formControlName="name" />
					</div>
					<div class="mb-3">
						<label class="form-label">Email</label>
						<input class="form-control" formControlName="email" type="email" />
					</div>
					<div class="mb-3">
						<label class="form-label">Password</label>
						<input class="form-control" formControlName="password" type="password" />
					</div>
					<div class="mb-3">
						<label class="form-label">Role</label>
						<select class="form-select" formControlName="role">
							<option value="ADMIN">ADMIN</option>
							<option value="FACULTY">FACULTY</option>
							<option value="STUDENT">STUDENT</option>
						</select>
					</div>

					<p *ngIf="message" class="small" [class.text-success]="message.includes('successful')" [class.text-danger]="!message.includes('successful')">{{ message }}</p>
					<p *ngIf="helpText" class="small text-warning-emphasis mb-2">{{ helpText }}</p>
					<app-reusable-button [type]="'submit'" [disabled]="submitting" [label]="submitting ? 'Creating account...' : 'Create Account'"></app-reusable-button>
				</form>
			</div>
		</div>
	</div>
</section>
