<section class="grid grid-cols-1 lg:grid-cols-12 gap-6">
  <div class="hidden lg:block lg:col-span-3">
    <app-sidebar></app-sidebar>
  </div>

  <div class="lg:col-span-9 space-y-6">
    <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-lg transition-all">
      <h2 class="text-2xl font-bold text-slate-900">Mail Tools</h2>
      <p class="text-sm text-slate-500">Admin utility to verify SMTP configuration before viva/demo.</p>
    </div>

    <div class="rounded-xl border border-slate-200 bg-white p-5 shadow-lg hover:shadow-xl transition-all">
      <h4 class="mb-3 font-semibold text-slate-800">Send Test Email</h4>
      <p class="mb-3 text-xs text-slate-500">Calls backend endpoint /api/auth/test-email.</p>

      <div class="space-y-3">
        <input #testEmailInput type="email" placeholder="student@example.com" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
        <input #testNameInput type="text" placeholder="Student Name (optional)" class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />

        <button (click)="sendTestEmail(testEmailInput.value, testNameInput.value)" [disabled]="loading" class="w-full rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-lg hover:bg-blue-700 hover:shadow-xl transition-all disabled:opacity-60">
          {{ loading ? 'Sending...' : 'Send Test Email' }}
        </button>

        <p *ngIf="message" class="text-xs" [class.text-emerald-600]="success" [class.text-amber-600]="!success">
          {{ message }}
        </p>
      </div>
    </div>
  </div>
</section>
