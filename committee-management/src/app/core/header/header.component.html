<nav class="mb-4 rounded-xl bg-gradient-to-r from-slate-800 to-blue-700 px-4 py-3 text-white shadow-lg transition-all">
  <div class="flex flex-wrap items-center gap-3">
    <a class="text-lg font-semibold tracking-wide" [routerLink]="homeRoute">{{ appName }}</a>

    <ul class="hidden md:flex items-center gap-2 lg:gap-4 text-sm font-medium text-slate-100">
      <li *ngIf="isLoggedIn"><a class="hover:text-white transition-all" [routerLink]="homeRoute">Dashboard</a></li>
      <li *ngIf="isLoggedIn"><a class="hover:text-white transition-all" routerLink="/events">Events</a></li>
      <li *ngIf="isLoggedIn"><a class="hover:text-white transition-all" routerLink="/tasks">Tasks</a></li>
      <li *ngIf="isLoggedIn"><a class="hover:text-white transition-all" routerLink="/attendance">Attendance</a></li>
    </ul>

    <div class="ml-auto flex items-center gap-2">
      <button *ngIf="isLoggedIn" type="button" title="Notifications" class="rounded-xl border border-white/30 bg-white/10 p-2 hover:bg-white/20 transition-all">
        <span class="material-icons">notifications</span>
      </button>

      <span *ngIf="isLoggedIn" class="rounded-xl bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-800">{{ currentRole }}</span>

      <a *ngIf="!isLoggedIn" routerLink="/auth/login" class="rounded-xl border border-white/50 px-3 py-1.5 text-sm hover:bg-white/10 transition-all">Login</a>
      <a *ngIf="!isLoggedIn" routerLink="/auth/register" class="rounded-xl bg-white px-3 py-1.5 text-sm font-semibold text-slate-800 hover:shadow-xl transition-all">Register</a>

      <button *ngIf="isLoggedIn" (click)="logout()" class="rounded-xl bg-red-500 px-3 py-1.5 text-sm font-medium hover:bg-red-600 transition-all">Logout</button>
    </div>
  </div>
</nav>
