<aside class="hidden lg:block fixed top-28 left-[max(0.75rem,calc((100vw-1320px)/2+0.75rem))] w-[260px] rounded-xl border border-slate-200 bg-white p-4 shadow-lg transition-all">
  <div class="mb-4">
    <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Role Workspace</p>
    <h6 class="mt-1 text-base font-semibold text-slate-800">{{ role }}</h6>
  </div>

  <nav class="space-y-2">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="bg-blue-600 text-white shadow-lg"
      [routerLinkActiveOptions]="{ exact: false }"
      class="workspace-link flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-blue-50 hover:text-blue-700 hover:shadow-xl transition-all">
      <span class="material-icons">{{ item.icon }}</span>
      <span>{{ item.label }}</span>
    </a>
  </nav>
</aside>
