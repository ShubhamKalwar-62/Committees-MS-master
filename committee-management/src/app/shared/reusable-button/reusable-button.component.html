<button
	[type]="type"
	class="inline-flex w-full items-center justify-center rounded-xl px-4 py-2 text-sm font-semibold shadow-sm transition-all duration-200 hover:-translate-y-0.5 disabled:cursor-not-allowed disabled:opacity-60 disabled:hover:translate-y-0"
	[ngClass]="buttonClass"
	[disabled]="disabled"
>
	{{ label }}
</button>
